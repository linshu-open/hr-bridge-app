name: Build APK

on:
  push:
    branches: [main, master, 'rewrite/**']
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./gradlew || true

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon --no-build-cache 2>&1 || gradle assembleDebug --stacktrace --no-daemon --no-build-cache

      - name: Build Release APK (fallback to debug signing)
        env:
          KEYSTORE_PATH: ${{ secrets.KEYSTORE_PATH != '' && format('{0}/app/release.keystore', github.workspace) || '' }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_PATH" ] && [ -f "$KEYSTORE_PATH" ]; then
            ./gradlew assembleRelease --stacktrace || gradle assembleRelease --stacktrace
          else
            echo "No release keystore; building release with debug signing"
            ./gradlew assembleRelease --stacktrace || gradle assembleRelease --stacktrace
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download release APK (or fallback to debug)
        uses: actions/download-artifact@v4
        continue-on-error: true
        id: dl-release
        with:
          name: app-release
          path: ./artifact

      - name: Download debug APK as fallback
        if: ${{ steps.dl-release.outcome == 'failure' }}
        uses: actions/download-artifact@v4
        with:
          name: app-debug
          path: ./artifact

      - name: Determine APK filename
        id: apk-file
        run: |
          if [ -f ./artifact/app-release.apk ]; then
            echo "apk=app-release.apk" >> "$GITHUB_OUTPUT"
          elif [ -f ./artifact/app-debug.apk ]; then
            echo "apk=app-debug.apk" >> "$GITHUB_OUTPUT"
          else
            echo "No APK found!" && ls -la ./artifact/ && exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifact/${{ steps.apk-file.outputs.apk }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
